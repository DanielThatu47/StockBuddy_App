#src/main/resources/application.properties
# ============================
# Server Configuration
# ============================
server.port=5000

# ============================
# MongoDB Atlas Configuration
# ============================
# MongoDB
spring.mongodb.uri=${MONGO_URI}
spring.mongodb.database=stockbuddy
# ============================

# JWT Configuration
# ============================
jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production}
jwt.expiration=604800000


# ============================
# Cloudinary Configuration
# ============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
# ============================
# Model API Configuration
# ============================
# Flask Model_Backend (app.py) defaults to port 5001
model.api.url=${MODEL_API_URL:https://danielthatu12-stockbuddy-prediction-model.hf.space}

# ============================
# Admin Configuration
# ============================
admin.emails=${ADMIN_EMAILS:danielthatu10@gmail.com}

# ============================
# File Upload Configuration
# ============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ============================
# Session Configuration
# ============================
server.servlet.session.timeout=30m

# ============================
# Logging
# ============================
logging.level.com.stockbuddy=INFO
logging.level.org.springframework.security=WARN

# ============================
# Mail (SMTP) — optional. For Gmail: App Password (16 chars), 2FA on account, "Mail" in Google account.
# Port 587: use STARTTLS only — do NOT set mail.smtp.ssl.enable=true (that is for implicit SSL / port 465).
# app.mail.from should be an address Gmail allows for this account (defaults to spring.mail.username).
# Prefer env: MAIL_FROM, SPRING_MAIL_USERNAME, SPRING_MAIL_PASSWORD (never commit real secrets).
# If spring.mail.host is omitted, no email is sent; API still returns otpPreview for dev.
# ============================
app.mail.from=${MAIL_FROM:StockBuddy <danielthatu10@gmail.com>}

# Email branding (HTML templates). Use an absolute HTTPS URL for the logo in production (CDN or static file host).
app.email.logo-url=${APP_EMAIL_LOGO_URL:}
app.email.app-link=${APP_EMAIL_APP_LINK:}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:danielthatu10@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD}
